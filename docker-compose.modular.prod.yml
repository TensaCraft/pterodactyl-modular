name: ${MODULAR_STACK_NAME:-pterodactyl-mods}

x-modular-environment: &modular-environment
  APP_ENV: production
  APP_ENVIRONMENT_ONLY: "false"
  APP_DEBUG: "false"
  APP_THEME: pterodactyl
  APP_KEY: ${APP_KEY:-}
  APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
  APP_URL: ${APP_URL:?Set APP_URL for the modular production stack}
  RECAPTCHA_ENABLED: ${RECAPTCHA_ENABLED:-true}
  HASHIDS_SALT: ${HASHIDS_SALT:-}
  CACHE_DRIVER: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  DB_CONNECTION: mysql
  DB_HOST: ${DB_HOST:?Set DB_HOST for the modular production stack}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE for the modular production stack}
  DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME for the modular production stack}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD for the modular production stack}
  REDIS_HOST: ${REDIS_HOST:?Set REDIS_HOST for the modular production stack}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD for the modular production stack}
  HASHIDS_LENGTH: ${HASHIDS_LENGTH:-8}
  LE_EMAIL: ${LE_EMAIL:-}

x-modular-common: &modular-common
  image: pterodactyl-modular:latest
  restart: unless-stopped
  environment: *modular-environment
  volumes:
    - pterodactyl-var:/app/var
    - pterodactyl-logs:/app/storage/logs
    - pterodactyl-vendor:/app/vendor
    - pterodactyl-node-modules:/app/node_modules
    - pterodactyl-assets:/app/public/assets
  networks:
    - default
    - shared-services

services:
  panel:
    <<: *modular-common
    container_name: ${MODULAR_PANEL_CONTAINER:-panel}
    build:
      context: .
      dockerfile: .docker/panel/Dockerfile
    command: ["/bin/ash", ".docker/panel/start-panel.sh"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel.entrypoints=http"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel.rule=Host(`${PANEL_DOMAIN:?Set PANEL_DOMAIN for the modular production stack}`)"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel.middlewares=${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-https-redirect"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-secure.entrypoints=https"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-secure.rule=Host(`${PANEL_DOMAIN:?Set PANEL_DOMAIN for the modular production stack}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-secure.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-secure.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-secure.service=${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-svc"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-pterodactyl-mods}-panel-svc.loadbalancer.server.port=80"
      - "traefik.docker.network=${PROXY_NETWORK:-proxy}"
    volumes:
      - pterodactyl-var:/app/var
      - pterodactyl-logs:/app/storage/logs
      - pterodactyl-vendor:/app/vendor
      - pterodactyl-node-modules:/app/node_modules
      - pterodactyl-assets:/app/public/assets
      - pterodactyl-nginx:/etc/nginx/http.d
      - pterodactyl-certs:/etc/letsencrypt
    networks:
      default: {}
      shared-services:
        aliases:
          - panel
          - pterodactyl-panel

  queue:
    <<: *modular-common
    container_name: ${MODULAR_QUEUE_CONTAINER:-queue}
    depends_on:
      - panel
    environment:
      <<: *modular-environment
      MODULAR_WAIT_FOR_PANEL_READY: "true"
    command: ["/bin/ash", ".docker/panel/start-queue.sh"]

  scheduler:
    <<: *modular-common
    container_name: ${MODULAR_SCHEDULER_CONTAINER:-scheduler}
    depends_on:
      - panel
    environment:
      <<: *modular-environment
      MODULAR_WAIT_FOR_PANEL_READY: "true"
    command: ["/bin/ash", ".docker/panel/start-scheduler.sh"]

  init:
    <<: *modular-common
    container_name: ${MODULAR_INIT_CONTAINER:-init}
    profiles: ["init"]
    restart: "no"
    environment:
      <<: *modular-environment
      INIT_RUN_MIGRATIONS: ${INIT_RUN_MIGRATIONS:-true}
      INIT_REBUILD_MODULE_REGISTRY: ${INIT_REBUILD_MODULE_REGISTRY:-true}
      INIT_SYNC_FRONTEND: ${INIT_SYNC_FRONTEND:-false}
      INIT_SETUP_LOCAL_WINGS: "false"
    command: ["/bin/ash", ".docker/panel/start-init.sh"]

volumes:
  pterodactyl-var:
  pterodactyl-logs:
  pterodactyl-vendor:
  pterodactyl-node-modules:
  pterodactyl-assets:
  pterodactyl-nginx:
  pterodactyl-certs:

networks:
  shared-services:
    external: true
    name: ${PROXY_NETWORK:-proxy}
