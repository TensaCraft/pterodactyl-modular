name: tensa-dev

x-modular-environment: &modular-environment
  APP_ENV: ${APP_ENV:-local}
  APP_ENVIRONMENT_ONLY: "false"
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_THEME: pterodactyl
  APP_KEY: ${APP_KEY:-}
  APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
  APP_URL: ${APP_URL:-http://panel.local.proxy}
  RECAPTCHA_ENABLED: ${RECAPTCHA_ENABLED:-false}
  HASHIDS_SALT: ${HASHIDS_SALT:-}
  CACHE_DRIVER: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  DB_CONNECTION: mysql
  DB_HOST: ${DB_HOST:?Set DB_HOST for the modular dev stack}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE for the modular dev stack}
  DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME for the modular dev stack}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD for the modular dev stack}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD for the modular dev stack}
  HASHIDS_LENGTH: ${HASHIDS_LENGTH:-8}
  LE_EMAIL: ${LE_EMAIL:-}

x-modular-common: &modular-common
  image: pterodactyl-modular:latest
  restart: unless-stopped
  environment: *modular-environment
  extra_hosts:
    - "${MODULAR_PANEL_DOMAIN:-panel.local.proxy}:host-gateway"
    - "${MODULAR_WINGS_DOMAIN:-wings.local.proxy}:host-gateway"
  volumes:
    - ./:/app
    - pterodactyl-dev-var:/app/var
    - pterodactyl-dev-logs:/app/storage/logs
    - pterodactyl-dev-vendor:/app/vendor
    - pterodactyl-dev-node-modules:/app/node_modules
    - pterodactyl-dev-assets:/app/public/assets
  networks:
    - default
    - shared-services

services:
  panel:
    <<: *modular-common
    container_name: tensa-dev-panel
    build:
      context: .
      dockerfile: .docker/panel/Dockerfile
    command: ["/bin/ash", ".docker/panel/start-panel.sh"]
    volumes:
      - ./:/app
      - pterodactyl-dev-var:/app/var
      - pterodactyl-dev-logs:/app/storage/logs
      - pterodactyl-dev-vendor:/app/vendor
      - pterodactyl-dev-node-modules:/app/node_modules
      - pterodactyl-dev-assets:/app/public/assets
      - pterodactyl-dev-nginx:/etc/nginx/http.d
      - pterodactyl-dev-certs:/etc/letsencrypt
    networks:
      default: {}
      shared-services:
        aliases:
          - panel
          - pterodactyl-panel

  queue:
    <<: *modular-common
    container_name: tensa-dev-queue
    depends_on:
      - panel
    environment:
      <<: *modular-environment
      MODULAR_WAIT_FOR_PANEL_READY: "true"
    command: ["/bin/ash", ".docker/panel/start-queue.sh"]

  scheduler:
    <<: *modular-common
    container_name: tensa-dev-scheduler
    depends_on:
      - panel
    environment:
      <<: *modular-environment
      MODULAR_WAIT_FOR_PANEL_READY: "true"
    command: ["/bin/ash", ".docker/panel/start-scheduler.sh"]

  init:
    <<: *modular-common
    container_name: tensa-dev-init
    profiles: ["init"]
    restart: "no"
    environment:
      <<: *modular-environment
      INIT_RUN_MIGRATIONS: ${INIT_RUN_MIGRATIONS:-true}
      INIT_REBUILD_MODULE_REGISTRY: ${INIT_REBUILD_MODULE_REGISTRY:-true}
      INIT_SYNC_FRONTEND: ${INIT_SYNC_FRONTEND:-false}
      INIT_SETUP_LOCAL_WINGS: ${INIT_SETUP_LOCAL_WINGS:-true}
    command: ["/bin/ash", ".docker/panel/start-init.sh"]

  wings:
    image: ghcr.io/pterodactyl/wings:v1.12.1
    container_name: tensa-dev-wings
    restart: unless-stopped
    tty: true
    depends_on:
      - panel
    environment:
      TZ: ${APP_TIMEZONE:-UTC}
      WINGS_UID: 988
      WINGS_GID: 988
      WINGS_USERNAME: pterodactyl
    extra_hosts:
      - "${MODULAR_PANEL_DOMAIN:-panel.local.proxy}:host-gateway"
      - "${MODULAR_WINGS_DOMAIN:-wings.local.proxy}:host-gateway"
    ports:
      - "${WINGS_HTTP_PORT:-8080}:8080"
      - "${WINGS_SFTP_PORT:-2022}:2022"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers
      - ./.docker/wings/etc:/etc/pterodactyl
      - ${LOCAL_WINGS_HOST_DATA_ROOT:-/var/lib/pterodactyl}:/var/lib/pterodactyl
      - ./.docker/wings/log:/var/log/pterodactyl
      - ${LOCAL_WINGS_HOST_TMP_ROOT:-/tmp/pterodactyl}:/tmp/pterodactyl
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - ${LOCAL_WINGS_HOST_RUN_ROOT:-/run/wings}:/run/wings
    networks:
      default: {}
      shared-services:
        aliases:
          - wings
          - pterodactyl-wings

  local-redis:
    image: redis:7-alpine
    container_name: tensa-dev-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-change-me}
    networks:
      default:
        aliases:
          - redis

volumes:
  pterodactyl-dev-var:
  pterodactyl-dev-logs:
  pterodactyl-dev-vendor:
  pterodactyl-dev-node-modules:
  pterodactyl-dev-assets:
  pterodactyl-dev-nginx:
  pterodactyl-dev-certs:

networks:
  shared-services:
    external: true
    name: ${MODULAR_SHARED_NETWORK:-proxy}
